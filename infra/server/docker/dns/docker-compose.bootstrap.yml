services:

  unbound:
    image: mvance/unbound-rpi:latest
    container_name: dns-unbound
    networks:
      - dns-net
    healthcheck:
      test: ["CMD", "drill", "google.com", "@127.0.0.1"]
      interval: 30s
      timeout: 10s
      retries: 3
    restart: unless-stopped

  pihole:
    image: pihole/pihole:latest
    container_name: dns-pihole
    hostname: pihole
    depends_on:
      - unbound
    networks:
      - dns-net
    restart: unless-stopped


networks:
  dns-net:
    external: true
