server:
    ###########################################################################
    # BASIC SETTINGS
    ###########################################################################
    # --- working directory for unbound ---
    directory: "/opt/unbound/etc/unbound"

    # --- chroot jail for isolation ---
    chroot: "/opt/unbound/etc/unbound"

    # --- drop privileges to this user ---
    username: "_unbound"

    # --- listen on all IPv4 interfaces ---
    interface: 0.0.0.0@53

    # --- listen on all IPv6 interfaces ---
    interface: ::0@53

    # --- run in foreground (useful for containers) ---
    do-daemonize: no

    ###########################################################################
    # RECURSION
    ###########################################################################
    # --- root DNS servers list (required for recursion) ---
    root-hints: "/opt/unbound/etc/unbound/root.hints"

    ###########################################################################
    # CACHE
    ###########################################################################
    # --- maximum TTL for cached records ---
    cache-max-ttl: 86400

    # --- minimum TTL for cached records ---
    cache-min-ttl: 300

    # --- message cache size ---
    msg-cache-size: 80m

    # --- RRset cache size ---
    rrset-cache-size: 160m

    # --- message cache sharding (reduce lock contention) ---
    msg-cache-slabs: 4

    # --- RRset cache sharding ---
    rrset-cache-slabs: 4

    # --- infrastructure cache sharding ---
    infra-cache-slabs: 4

    # --- DNSSEC key cache sharding ---
    key-cache-slabs: 4

    # --- negative cache size (NXDOMAIN etc.) ---
    neg-cache-size: 4M

    ###########################################################################
    # PERFORMANCE
    ###########################################################################
    # --- number of worker threads ---
    num-threads: 3

    # --- max queries handled per thread ---
    num-queries-per-thread: 4096

    # --- number of outgoing ports per thread ---
    outgoing-range: 8192

    # --- number of TCP buffers per thread ---
    incoming-num-tcp: 10

    # --- enable SO_REUSEPORT for better load distribution ---
    so-reuseport: yes

    # --- prefetch popular records before expiration ---
    prefetch: yes

    # --- prefetch DNSSEC keys early ---
    prefetch-key: yes

    # --- serve expired cache while refreshing ---
    serve-expired: yes

    # --- reduce response size (omit unnecessary sections) ---
    minimal-responses: yes

    # --- randomize RR order ---
    rrset-roundrobin: yes

    # --- EDNS buffer size (DNS Flag Day compliant) ---
    edns-buffer-size: 1232

    ###########################################################################
    # NETWORK / BEHAVIOR
    ###########################################################################
    # --- delay closing sockets after timeout (ms) ---
    delay-close: 10000

    # --- allow querying localhost (disable blocking) ---
    do-not-query-localhost: yes

    ###########################################################################
    # DNSSEC
    ###########################################################################
    # --- trust anchor for DNSSEC validation ---
    auto-trust-anchor-file: "var/root.key"

    # --- prevent DNSSEC downgrade attacks ---
    harden-algo-downgrade: yes

    # --- return NXDOMAIN for subdomains of NXDOMAIN ---
    harden-below-nxdomain: yes

    # --- require DNSSEC where expected ---
    harden-dnssec-stripped: yes

    # --- only trust in-zone glue records ---
    harden-glue: yes

    # --- drop oversized queries ---
    harden-large-queries: yes

    # --- extra validation on referral path (disabled for stability) ---
    harden-referral-path: no

    # --- ignore small EDNS buffer sizes ---
    harden-short-bufsize: yes

    # --- clean additional section in DNSSEC responses ---
    val-clean-additional: yes

    # --- synthesize negative responses from cache ---
    aggressive-nsec: yes

    ###########################################################################
    # PRIVACY
    ###########################################################################
    # --- minimize query name leakage ---
    qname-minimisation: yes

    # --- randomize query case for spoofing resistance ---
    use-caps-for-id: yes

    # --- hide server identity ---
    hide-identity: yes

    # --- hide version info ---
    hide-version: yes

    # --- control HTTP user-agent behavior ---
    hide-http-user-agent: no

    # --- set HTTP user-agent string ---
    http-user-agent: "DNS"

    # --- custom identity string ---
    identity: "DNS"

    ###########################################################################
    # SECURITY
    ###########################################################################
    # --- allow localhost queries ---
    access-control: 127.0.0.1/32 allow

    # --- allow LAN (192.168.x.x) ---
    access-control: 192.168.0.0/16 allow

    # --- allow private range 172.16.x.x ---
    access-control: 172.16.0.0/12 allow

    # --- allow private range 10.x.x.x ---
    access-control: 10.0.0.0/8 allow

    # --- block ANY queries ---
    deny-any: yes

    # --- filter private IPs in public DNS answers ---
    private-address: 10.0.0.0/8
    private-address: 172.16.0.0/12
    private-address: 192.168.0.0/16
    private-address: 169.254.0.0/16

    # --- limit outbound query rate ---
    ratelimit: 1000

    # --- threshold for cache poisoning protection ---
    unwanted-reply-threshold: 10000

    ###########################################################################
    # TLS
    ###########################################################################
    # --- CA bundle for TLS validation ---
    tls-cert-bundle: /etc/ssl/certs/ca-certificates.crt

    ###########################################################################
    # LOGGING
    ###########################################################################
    # --- minimal logging level ---
    verbosity: 0

    # --- discard logs ---
    logfile: /dev/null

    # --- disable query logging ---
    log-queries: no

    # --- disable reply logging ---
    log-replies: no

    # --- disable local actions logging ---
    log-local-actions: no

    # --- disable SERVFAIL logging ---
    log-servfail: no

    ###########################################################################
    # LOCAL ZONES
    ###########################################################################
    # --- include static A records ---
    include: /opt/unbound/etc/unbound/a-records.conf

    # --- include SRV records ---
    include: /opt/unbound/etc/unbound/srv-records.conf

    ###########################################################################
    # NO FORWARDERS
    ###########################################################################
    # --- full recursion (no upstream DNS) ---

remote-control:
    # --- disable remote control interface ---
    control-enable: no
