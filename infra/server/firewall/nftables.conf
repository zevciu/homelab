#!/usr/sbin/nft -f

flush ruleset

table inet filter {

  #
  # =========================
  # INPUT CHAIN
  # =========================
  #
  chain input {
    type filter hook input priority 0;
    policy drop;

    # --- loopback ---
    iif "lo" accept

    # --- established / related ---
    ct state established,related accept

    # --- ICMP / ICMPv6 ---
    ip protocol icmp accept
    ip6 nexthdr icmpv6 accept

    # =========================
    # DNS (Pi-hole)
    # =========================

    # --- UDP DNS ---
    iifname { "eth0", "tailscale0" } udp dport 53 accept

    # --- TCP DNS ---
    iifname { "eth0", "tailscale0" } tcp dport 53 accept

    # =========================
    # HTTP / HTTPS (NGINX)
    # =========================

    iifname { "eth0", "tailscale0" } tcp dport { 80, 443 } accept

    # =========================
    # SSH ADMIN ACCESS
    # =========================

    iifname { "eth0", "tailscale0" } tcp dport 22 accept
  }


  #
  # =========================
  # FORWARD CHAIN
  # =========================
  #
  chain forward {
    type filter hook forward priority 0;
    policy drop;

    # --- allow established flows ---
    ct state established,related accept

    # --- host → docker bridge ---
    iifname { "eth0", "tailscale0" } oifname { "br-*", "docker0", "veth*" } accept

    # --- docker → outside ---
    iifname { "br-*", "docker0", "veth*" } oifname { "eth0", "tailscale0" } accept

    # --- container-to-container ---
    iifname { "br-*", "docker0", "veth*" } oifname { "br-*", "docker0", "veth*" } accept
  }


  #
  # =========================
  # OUTPUT CHAIN
  # =========================
  #
  chain output {
    type filter hook output priority 0;
    policy accept;
  }
}
